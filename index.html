<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex</title>

    <link rel="icon" type="image/x-icon" href="assets/images/pokeball-logo.png">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="styles/standard.css">
    <link rel="stylesheet" href="styles/assets.css">
    <link rel="stylesheet" href="styles/colors.css">
    <link rel="stylesheet" href="styles/templates.css">
    <link rel="stylesheet" href="styles/modal.css">
</head>

<body onload="init()">

    <header>
        <div class="content-wrapper">
            <div class="header-content">
                <div class="header-start">
                    <img class="header-img" src="assets/images/pokeball-logo.png" alt="small pokeball">
                    <h1 class="strokeme">POKEDEX</h1>
                </div>
                <input type="search" name="pokeSearch" id="pokeSearch" min="3" max="15" placeholder="search..." oninput="searchPokemon(this.value)">
            </div>
        </div>
    </header>

    <main>
        <div class="content-wrapper">
            <div class="main-content">
                <div id="mainContainer"></div>
                <button onclick="loadMore()" id="showMoreButton">show more</button>
            </div>
        </div>
    </main>

    <dialog id="bigPokemonCard">
        <div class="big-pokemon-card">
            <div class="big-card-top">

            </div>
            <div class="big-card-bottom">

            </div>
        </div>
    </dialog>

    <footer>
        <div class="content-wrapper">
            <div class="footer-content">
                <img onclick="changeMode()" class="footer-img" src="assets/images/lugia.png" alt="">
            </div>
        </div>
    </footer>

</body>

<script src="script.js"></script>
<script src="scripts/templates.js"></script>
<script src="scripts/remoteStorage.js"></script>
<script src="scripts/modal.js"></script>

</html>
