<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex</title>

    <link rel="icon" type="image/x-icon" href="assets/images/pokeball-logo.png">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="styles/standard.css">
    <link rel="stylesheet" href="styles/assets.css">
    <link rel="stylesheet" href="styles/colors.css">
</head>

<body>

    <header>
        <div class="content-wrapper">
            <div class="header-content">
                <div class="header-start">
                    <img class="logo-img" src="assets/images/pokeball-logo.png" alt="small pokeball">
                    <h1 class="strokeme">POKEDEX</h1>
                </div>
                <input type="search" name="pokeSearch" id="pokeSearch" min="3" max="15">
            </div>
        </div>
    </header>

    <main>
        <div class="content-wrapper">
            <div class="main-content">
                <div id="mainContainer"></div>
            </div>
        </div>
    </main>

    <footer>
        <div class="content-wrapper">
            <div class="footer-content">
                <a class="link-black" href="#">Impressum</a>
                <img class="logo-img" src="assets/images/pokeball-logo.png" alt="">
                <a class="link-white" href="#">Contact</a>
            </div>
        </div>
    </footer>

</body>

<script src="script.js"></script>
<script src="scripts/templates.js"></script>
<script src="scripts/db.json"></script>

</html>
