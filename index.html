<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokedex</title>

    <link rel="icon" type="image/x-icon" href="assets/images/pokeball-logo.png">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="styles/standard.css">
    <link rel="stylesheet" href="styles/assets.css">
    <link rel="stylesheet" href="styles/colors.css">
    <link rel="stylesheet" href="styles/templates.css">
    <link rel="stylesheet" href="styles/modal.css">
</head>

<body onload="init()">

    <header>
        <div class="content-wrapper">
            <div class="header-content">
                <div class="header-start">
                    <img onclick="toggleShimmer()" class="header-img" src="assets/images/pokeball-logo.png" alt="small pokeball">
                    <h1 class="strokeme">POKEDEX</h1>
                </div>
                <div class="field">
                    <input required type="search" name="pokeSearch" id="pokeSearch" minlength="3" maxlength="15"
                        placeholder="search ..." oninput="searchPokemon(this.value)">
                    <div class="tooltip">
                        min. 3 letters
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main>
        <div class="content-wrapper">
            <div class="main-content">
                <div id="mainContainer"></div>
                <button onclick="loadMore()" id="showMoreButton">show more</button>
            </div>
        </div>
    </main>

    <div id="spinner" class="spinner hidden">
        <img src="assets/images/pokeball-logo.png">
    </div>

    <dialog onclick="dialogClick(event)" id="bigPokemonCard"></dialog>

    <footer>
        <div class="content-wrapper">
            <div class="footer-content">
                <img onclick="toggleMode(this)" id="footerImage" class="footer-img" src="assets/images/lugia.png">
            </div>
        </div>
    </footer>

</body>

<script src="script.js"></script>
<script src="scripts/templates.js"></script>
<script src="scripts/remoteStorage.js"></script>
<script src="scripts/smallCards.js"></script>
<script src="scripts/search.js"></script>
<script src="scripts/modal.js"></script>
<script src="scripts/spinner.js"></script>
<script src="scripts/toggleStyle.js"></script>
<script src="scripts/nextPrev.js"></script>

</html>
